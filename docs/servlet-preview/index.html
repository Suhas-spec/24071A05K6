<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Servlet User Details App Preview</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #22324a;
        --muted: #607089;
        --primary: #0d8abc;
        --border: rgba(34, 50, 74, 0.12);
        --shadow: 0 18px 40px rgba(22, 48, 77, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, #eef5ff, #f8fbff);
      }

      .page {
        width: min(92vw, 760px);
        margin: 48px auto;
        display: grid;
        gap: 22px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        box-shadow: var(--shadow);
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      .sub {
        color: var(--muted);
        line-height: 1.7;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      input {
        width: 100%;
        padding: 13px 14px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: 14px;
        font-size: 1rem;
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 13px 18px;
        background: var(--primary);
        color: #ffffff;
        font-size: 1rem;
        cursor: pointer;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
      }

      th,
      td {
        border: 1px solid var(--border);
        padding: 12px;
        text-align: left;
      }

      th {
        background: #f3f8ff;
      }

      .footer {
        margin-top: 20px;
        color: var(--muted);
        font-weight: 700;
      }

      .hidden {
        display: none;
      }

      .top-link {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <a class="top-link" href="../">Back to previews</a>
        <h1>Servlet User Details App</h1>
        <p class="sub">
          This is a static preview of how the servlet project looks online. The
          original Java servlet is not running here, but the form UI is shown.
        </p>
      </section>

      <section class="card">
        <h2>User Details Form</h2>
        <form id="preview-form">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Enter name" required />

          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="Enter email"
            required
          />

          <label for="age">Age</label>
          <input id="age" name="age" type="number" placeholder="Enter age" required />

          <button type="submit">Submit</button>
        </form>
      </section>

      <section id="result" class="card hidden">
        <h2>Entered User Details</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Age</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td id="result-name"></td>
              <td id="result-email"></td>
              <td id="result-age"></td>
            </tr>
          </tbody>
        </table>
        <div class="footer">Roll No: 24071A05K6</div>
      </section>
    </main>

    <script>
      const form = document.getElementById("preview-form");
      const result = document.getElementById("result");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        document.getElementById("result-name").textContent =
          document.getElementById("name").value;
        document.getElementById("result-email").textContent =
          document.getElementById("email").value;
        document.getElementById("result-age").textContent =
          document.getElementById("age").value;

        result.classList.remove("hidden");
        result.scrollIntoView({ behavior: "smooth" });
      });
    </script>
  </body>
</html>
